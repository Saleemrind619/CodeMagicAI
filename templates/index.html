<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    <link rel="icon" href="https://fav.farm/🪄" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a15; color: white; font-family: sans-serif; cursor: none; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* MOUSE CIRCLES */
        #cursor-outer, #cursor-inner { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; border-radius: 50%; will-change: transform; transition: transform 0.06s linear; }
        #cursor-inner { width: 8px; height: 8px; border: 1.5px solid #10b981; background: rgba(16, 185, 129, 0.3); }
        #cursor-outer { width: 22px; height: 22px; border: 1px solid rgba(59, 130, 246, 0.5); }
        body.hovering-effect #cursor-outer { width: 35px; height: 35px; border-color: #10b981; background: rgba(16, 185, 129, 0.1); }

        /* BRANDING & LIVE STATUS */
        .i-container { position: relative; display: inline-block; }
        .i-dot { position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        .status-glow { animation: status-pulse 2s infinite; }
        @keyframes status-pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* BUTTON EFFECTS */
        .btn-magic { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-magic:hover { transform: scale(1.05); }
        .btn-magic:active { transform: scale(0.95); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* SOCIAL MENU TRANSITION */
        #socialOptions.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    </style>
</head>
<body class="flex flex-col">

    <!-- Custom Cursor -->
    <div id="cursor-outer"></div>
    <div id="cursor-inner"></div>

    <!-- Floating Chat & Social Menu -->
    <div class="fixed bottom-8 right-8 z-[100] flex flex-col-reverse items-center gap-4">
        <button onclick="toggleSocial()" id="mainChatBtn" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-900/40 hover:scale-110 transition-all duration-300 relative">
            <div class="absolute inset-0 rounded-full bg-blue-600 animate-ping opacity-20"></div>
            <svg id="chatIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 16 16">
                <path d="M2.678 11.894a1 1 0 0 1 .287.801 11 11 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8 8 0 0 0 8 14c3.996 0 7-2.807 7-6s-3.004-6-7-6-7 2.808-7 6c0 1.468.617 2.83 1.678 3.894Z"/>
            </svg>
            <span id="closeIcon" class="hidden text-white text-2xl font-bold">&times;</span>
        </button>
        
        <div id="socialOptions" class="flex flex-col gap-3 opacity-0 pointer-events-none translate-y-10 transition-all duration-500">
            <a href="https://www.instagram.com/saleemrind619" target="_blank" class="w-10 h-10 bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="w-6 h-6">
            </a>
            <a href="https://www.facebook.com/saleemahmadrind" target="_blank" class="w-10 h-10 bg-[#1877F2] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" class="w-5 h-5">
            </a>
            <a href="https://wa.me/923111189900" target="_blank" class="w-10 h-10 bg-[#25D366] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-6 h-6">
            </a>
        </div>
    </div>

    <main class="max-w-7xl mx-auto flex-grow w-full p-6 md:p-10">
        <!-- Header Section -->
        <header class="mb-12 border-b border-slate-800/50 pb-8 flex flex-col md:flex-row justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 bg-clip-text text-transparent inline-block">
                    CodeMagic A<span class="i-container text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">i<span class="i-dot animate-pulse"></span></span>
                </h1>
                <p class="text-slate-600 text-[11px] mt-1.5 uppercase tracking-[0.4em]">Advanced File & Theme Engine</p>
            </div>
            <div class="flex items-center gap-2 text-[10px] text-emerald-400 font-bold bg-emerald-950/30 px-4 py-2 rounded-full border border-emerald-500/20 status-glow">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="tracking-widest uppercase">System Online</span>
            </div>
        </header>

        <!-- Main Glass Container -->
        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest font-mono">Input Terminal</label>
                <div class="flex items-center gap-2.5">
                    <div class="bg-slate-900 px-4 py-2.5 rounded-xl border border-slate-800 flex items-center gap-2">
                        <label for="fileInput" class="cursor-pointer text-[11px] font-bold text-slate-300" id="labelTxt">📎 ATTACH FILE / LAYOUT</label>
                        <button id="remBtn" onclick="removeFile()" class="hidden text-red-500 font-bold ml-1">✕</button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" onchange="updateFile()">
                    <span id="fName" class="text-[11px] text-blue-400 italic truncate max-w-[100px]"></span>
                </div>
            </div>

            <textarea id="userInput" class="w-full h-72 bg-slate-950 border border-slate-800 rounded-3xl p-8 text-sm font-mono focus:border-blue-500 outline-none custom-scrollbar" placeholder="Describe layout, paste code, or enter URL..."></textarea>
            
            <!-- Button Grid -->
            <div class="mt-10 grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="flex flex-col">
                    <span class="text-[11px] text-slate-500 mb-2.5 uppercase font-bold tracking-tight">Environment</span>
                    <select id="targetEditor" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm outline-none cursor-pointer text-white">
                        <option value="elementor">WordPress (Elementor)</option>
                        <option value="tailwind">Tailwind CSS</option>
                        <option value="react">React / Next.js</option>
                    </select>
                </div>
                <button onclick="handleSend('clone')" class="btn-magic bg-blue-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-blue-900/20">🚀 Clone Website</button>
                <button onclick="handleSend('layout')" class="btn-magic bg-emerald-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-emerald-900/20">🎨 Layout to Code</button>
                <button onclick="handleSend('debug')" class="btn-magic bg-slate-800 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-black/40">🔍 Fix My Bug</button>
                <button onclick="handleSend('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-indigo-900/20">🕵️ WP Detect</button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="hidden mt-12 text-center">
            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-blue-400 text-xs font-mono uppercase tracking-[0.3em] animate-pulse">Neural Engine Processing...</p>
        </div>

        <!-- Result Output -->
        <div id="resBox" class="hidden mt-12 pb-10">
            <div class="flex justify-between items-center mb-4 px-4">
                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">AI Generation Output</span>
                <div class="flex gap-4">
                    <button onclick="copyResult()" class="text-[10px] text-blue-400 hover:text-white transition-colors">COPY CODE</button>
                    <!-- DOWNLOAD BUTTON ADDED HERE -->
                    <button id="downloadBtn" onclick="downloadFile()" class="hidden text-[10px] text-emerald-400 hover:text-white transition-colors font-bold uppercase tracking-widest">⬇️ Download File</button>
                </div>
            </div>
            <div id="result" class="bg-slate-950 border border-slate-900 p-10 rounded-[2.5rem] font-mono text-xs text-emerald-500/80 overflow-x-auto whitespace-pre-wrap custom-scrollbar shadow-inner min-h-[100px]"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-8 border-t border-slate-800/50 bg-slate-950/30 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-slate-500 text-xs uppercase tracking-widest font-medium">© 2026 CodeMagic Ai | Official Theme Engine</p>
            <div class="flex gap-8 text-slate-500 text-[10px] font-bold uppercase tracking-widest md:mr-24">
                <a href="#" class="hover:text-blue-400 transition-colors">Documentation</a>
                <a href="#" class="hover:text-blue-400 transition-colors">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <script>
        // MOUSE LOGIC
        const inner = document.getElementById('cursor-inner');
        const outer = document.getElementById('cursor-outer');
        document.addEventListener('mousemove', (e) => {
            inner.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            outer.style.transform = `translate3d(${e.clientX - 8}px, ${e.clientY - 8}px, 0)`;
        });
        document.querySelectorAll('button, select, label, textarea, a').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering-effect'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering-effect'));
        });

        // SOCIAL TOGGLE
        function toggleSocial() {
            const opt = document.getElementById('socialOptions');
            const chat = document.getElementById('chatIcon');
            const close = document.getElementById('closeIcon');
            opt.classList.toggle('show');
            chat.classList.toggle('hidden'); 
            close.classList.toggle('hidden');
        }

        // FILE HANDLING
        function updateFile() {
            const inp = document.getElementById('fileInput');
            if(inp.files[0]) {
                document.getElementById('fName').innerText = `[${inp.files[0].name}]`;
                document.getElementById('remBtn').classList.remove('hidden');
                document.getElementById('labelTxt').innerText = "CHANGE FILE";
            }
        }
        function removeFile() {
            document.getElementById('fileInput').value = ""; 
            document.getElementById('fName').innerText = "";
            document.getElementById('remBtn').classList.add('hidden'); 
            document.getElementById('labelTxt').innerText = "ATTACH FILE / LAYOUT";
        }

        // GLOBAL FILENAME
        let activeFileName = "index.html";

        // MAIN SEND FUNCTION
        async function handleSend(mode) {
            const text = document.getElementById('userInput').value;
            const editor = document.getElementById('targetEditor').value;
            
            if(!text.trim()) {
                alert("Please enter some text or a URL first!");
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resBox').classList.add('hidden');
            document.getElementById('downloadBtn').classList.add('hidden');
            
            const formData = new FormData();
            formData.append('text', text);
            formData.append('mode', mode);
            formData.append('editor', editor);

            try {
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.status === "success") {
                    document.getElementById('result').innerText = data.result;
                    // Show download button if file_name is present
                    if(data.file_name && mode !== 'wp_detect') {
                        activeFileName = data.file_name;
                        document.getElementById('downloadBtn').classList.remove('hidden');
                    }
                } else {
                    document.getElementById('result').innerText = "Error: " + data.result;
                }
                document.getElementById('resBox').classList.remove('hidden');
                document.getElementById('resBox').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert("Server Connection Failed.");
                console.error(error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function copyResult() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Code copied to clipboard!"));
        }

        // DOWNLOAD FUNCTION
        function downloadFile() {
            const content = document.getElementById('result').innerText;
            if(!content) return;
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = activeFileName;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
