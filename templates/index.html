<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Neural Engine</title>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 50px auto; }
        h1 { color: #10b981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.5); font-size: 2.5rem; }
        .tool-box { background: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 12px; margin-bottom: 30px; }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #010409; color: white; }
        button { padding: 12px 25px; background: #10b981; border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); box-shadow: 0 0 10px #10b981; }
        .result { margin-top: 15px; color: #10b981; font-family: monospace; white-space: pre-wrap; text-align: left; padding: 10px; background: #010409; border-radius: 5px; display: none; }
        .plugin-tag { display: inline-block; background: #21262d; border: 1px solid #10b981; padding: 4px 10px; border-radius: 15px; margin: 4px; font-size: 12px; }
        footer { margin-top: 50px; color: #888; font-size: 0.9rem; border-top: 1px solid #333; padding-top: 20px; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <h1>CodeMagic AI</h1>
    <p style="color: #8b949e;">Neural Engine v3.0 Active</p>

    <div class="tool-box">
        <h3>Clone / Layout / Bug Fix</h3>
        <textarea id="aiPrompt" rows="4" placeholder="Describe layout, paste code to fix, or enter URL to clone..."></textarea>
        <button onclick="processAI('general')">Execute Neural Task</button>
        <div id="aiRes" class="result"></div>
    </div>

    <div class="tool-box">
        <h3>WP Theme & Plugin Detector</h3>
        <input type="text" id="wpUrl" placeholder="Enter WordPress Site URL">
        <button onclick="processWP()">Scan Ecosystem</button>
        <div id="wpRes" class="result"></div>
    </div>

    <footer>
        <p>&copy; 2026 CodeMagic AI | <a href="#" style="color:#10b981; text-decoration:none;">Privacy Policy</a></p>
    </footer>
</div>

<a href="https://wa.me/923111189900" class="wa-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</a>

<script>
    async function processAI(type) {
        const prompt = document.getElementById('aiPrompt').value;
        const resDiv = document.getElementById('aiRes');
        resDiv.style.display = "block";
        resDiv.innerText = "Processing through Gemini AI...";
        
        const response = await fetch('/ai-task', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({type, prompt})
        });
        const data = await response.json();
        resDiv.innerText = data.result;
    }

    async function processWP() {
        const url = document.getElementById('wpUrl').value;
        const resDiv = document.getElementById('wpRes');
        resDiv.style.display = "block";
        resDiv.innerText = "Scanning Site...";

        const response = await fetch('/analyze-wp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url})
        });
        const data = await response.json();
        if(data.status === "success") {
            resDiv.innerHTML = `<b>Theme:</b> ${data.theme}<br><br><b>Plugins:</b><br>` + 
                               data.plugins.map(p => `<span class="plugin-tag">${p}</span>`).join('');
        } else {
            resDiv.innerText = "Error scanning site.";
        }
    }
</script>
</body>
</html>
