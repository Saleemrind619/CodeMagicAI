<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    <link rel="icon" href="https://fav.farm/🪄" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050a15; color: white; font-family: sans-serif; cursor: none; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* MOUSE CIRCLES */
        #cursor-outer, #cursor-inner { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; border-radius: 50%; will-change: transform; transition: transform 0.06s linear; }
        #cursor-inner { width: 8px; height: 8px; border: 1.5px solid #10b981; background: rgba(16, 185, 129, 0.3); }
        #cursor-outer { width: 22px; height: 22px; border: 1px solid rgba(59, 130, 246, 0.5); }
        body.hovering-effect #cursor-outer { width: 35px; height: 35px; border-color: #10b981; background: rgba(16, 185, 129, 0.1); }

        /* BUTTON EFFECTS */
        .btn-magic { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-magic:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        /* TECH STACK HOVER & CLICK LOGIC */
        .tech-option { transition: all 0.2s ease; color: #64748b; cursor: pointer; }
        .tech-option:hover { font-weight: 900; color: #ffffff; }
        .tech-option:hover i { transform: scale(1.2) rotate(5deg); }
        
        /* Jab Click ho tab Button banay */
        .tech-active-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 18px;
            border-radius: 12px;
            color: white !important;
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col">

    <div id="cursor-outer"></div>
    <div id="cursor-inner"></div>

    <main class="max-w-7xl mx-auto flex-grow w-full p-6 md:p-10">
        <header class="mb-12 border-b border-slate-800/50 pb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 bg-clip-text text-transparent inline-block">CodeMagic AI</h1>
                <p class="text-slate-600 text-[11px] mt-1.5 uppercase tracking-[0.4em]">Advanced Engine</p>
            </div>
            <div class="text-[10px] text-emerald-400 font-bold bg-emerald-950/30 px-4 py-2 rounded-full border border-emerald-500/20">
                SYSTEM ONLINE
            </div>
        </header>

        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <!-- ORIGINAL MAIN BUTTONS -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <button onclick="handleSend('clone')" class="btn-magic bg-blue-600 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-900/20">🚀 Clone Site</button>
                <button onclick="handleSend('layout')" class="btn-magic bg-emerald-600 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-emerald-900/20">🎨 Layout Code</button>
                <button onclick="handleSend('debug')" class="btn-magic bg-slate-800 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest border border-slate-700">🔍 Fix Bug</button>
                <button onclick="handleSend('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-indigo-900/20">🕵️ WP Detect</button>
            </div>

            <!-- NEW OPTIONS SECTION (Directly Under Buttons) -->
            <div style="border-top: 1px solid rgba(255,255,255,0.08); margin-top: 20px; padding-top: 25px; margin-bottom: 30px;">
                <div class="flex justify-between items-center px-4 md:px-12">
                    <!-- Left: Elementor -->
                    <div onclick="selectTech(this)" class="tech-option flex items-center gap-3 group">
                        <i class="fas fa-layer-group text-pink-500 text-lg transition-transform"></i>
                        <span class="text-[11px] font-medium uppercase tracking-widest">Elementor</span>
                    </div>

                    <!-- Mid: Tailwind CSS -->
                    <div onclick="selectTech(this)" class="tech-option flex items-center gap-3 group">
                        <i class="fab fa-css3 text-cyan-400 text-lg transition-transform"></i>
                        <span class="text-[11px] font-medium uppercase tracking-widest">Tailwind CSS</span>
                    </div>

                    <!-- Right: React / Next.js -->
                    <div onclick="selectTech(this)" class="tech-option flex items-center gap-3 group">
                        <i class="fab fa-react text-blue-500 text-lg transition-transform"></i>
                        <span class="text-[11px] font-medium uppercase tracking-widest">React / Next.js</span>
                    </div>
                </div>
            </div>

            <!-- INPUT SECTION -->
            <textarea id="userInput" class="w-full h-64 bg-slate-950 border border-slate-800 rounded-3xl p-6 text-sm font-mono focus:border-blue-500 outline-none custom-scrollbar" placeholder="Paste URL or describe layout..."></textarea>
        </div>

        <div id="loading" class="hidden mt-8 text-center text-blue-400 font-mono text-[10px] tracking-widest animate-pulse">PROCESSING...</div>

        <div id="resBox" class="hidden mt-12 pb-20">
            <div id="result" class="bg-slate-950 border border-slate-900 p-8 rounded-[2.5rem] font-mono text-[11px] text-emerald-500/80 overflow-x-auto whitespace-pre-wrap"></div>
        </div>
    </main>

    <script>
        // MOUSE LOGIC
        const inner = document.getElementById('cursor-inner');
        const outer = document.getElementById('cursor-outer');
        document.addEventListener('mousemove', (e) => {
            inner.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            outer.style.transform = `translate3d(${e.clientX - 8}px, ${e.clientY - 8}px, 0)`;
        });

        // TECH SELECTION LOGIC
        function selectTech(el) {
            // Pehle sab se class hatao
            document.querySelectorAll('.tech-option').forEach(item => {
                item.classList.remove('tech-active-btn');
            });
            // Clicked wale par button style lagao
            el.classList.add('tech-active-btn');
        }

        async function handleSend(mode) {
            const text = document.getElementById('userInput').value;
            if(!text.trim()) return alert("Enter something!");
            document.getElementById('loading').classList.remove('hidden');
            const formData = new FormData();
            formData.append('text', text);
            formData.append('mode', mode);
            const response = await fetch('/process', { method: 'POST', body: formData });
            const data = await response.json();
            document.getElementById('result').innerText = data.result;
            document.getElementById('resBox').classList.remove('hidden');
            document.getElementById('loading').classList.add('hidden');
        }
    </script>
</body>
</html>
