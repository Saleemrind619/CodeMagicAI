<script>
    function toggleSocial() {
        const options = document.getElementById('socialOptions');
        const chatIcon = document.getElementById('chatIcon');
        const closeIcon = document.getElementById('closeIcon');
        
        if (options.classList.contains('opacity-0')) {
            // Open
            options.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-10');
            chatIcon.classList.add('hidden');
            closeIcon.classList.remove('hidden');
        } else {
            // Close
            options.classList.add('opacity-0', 'pointer-events-none', 'translate-y-10');
            chatIcon.classList.remove('hidden');
            closeIcon.classList.add('hidden');
        }
    }
</script>
