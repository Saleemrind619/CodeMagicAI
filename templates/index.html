<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    <link rel="icon" href="https://fav.farm/🪄" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a15; color: white; font-family: sans-serif; cursor: none; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        #cursor-outer, #cursor-inner { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; border-radius: 50%; will-change: transform; transition: transform 0.06s linear; }
        #cursor-inner { width: 8px; height: 8px; border: 1.5px solid #10b981; background: rgba(16, 185, 129, 0.3); }
        #cursor-outer { width: 22px; height: 22px; border: 1px solid rgba(59, 130, 246, 0.5); }
        body.hovering-effect #cursor-outer { width: 35px; height: 35px; border-color: #10b981; background: rgba(16, 185, 129, 0.1); }

        .i-container { position: relative; display: inline-block; }
        .i-dot { position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        
        .btn-magic { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-magic:hover { transform: scale(1.02); }

        /* Tech Options Styling */
        .tech-pill-container { background: rgba(2, 6, 23, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 6px; display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 600px; margin: 0 auto; }
        .tech-btn { padding: 10px 25px; border-radius: 14px; font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease; border: 1px solid transparent; }
        .tech-btn:hover { color: #3b82f6; }
        .tech-active { background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        #socialOptions.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    </style>
</head>
<body class="flex flex-col">

    <div id="cursor-outer"></div>
    <div id="cursor-inner"></div>

    <!-- Floating Chat -->
    <div onmouseleave="closeChat()" class="fixed bottom-8 right-8 z-[100] flex flex-col-reverse items-center gap-4">
        <button onclick="toggleSocial()" id="mainChatBtn" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg relative">
            <svg id="chatIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="white" viewBox="0 0 16 16"><path d="M2.678 11.894a1 1 0 0 1 .287.801 11 11 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8 8 0 0 0 8 14c3.996 0 7-2.807 7-6s-3.004-6-7-6-7 2.808-7 6c0 1.468.617 2.83 1.678 3.894Z"/></svg>
            <span id="closeIcon" class="hidden text-white text-2xl font-bold">&times;</span>
        </button>
        <div id="socialOptions" class="flex flex-col gap-3 opacity-0 pointer-events-none translate-y-10 transition-all duration-500">
            <a href="https://www.instagram.com/saleemrind619" target="_blank" class="w-10 h-10 bg-gradient-to-tr from-[#f9ce34] via-[#ee2a7b] to-[#6228d7] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="w-6 h-6"></a>
            <a href="https://www.facebook.com/saleemahmadrind" target="_blank" class="w-10 h-10 bg-[#1877F2] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" class="w-5 h-5"></a>
            <a href="https://wa.me/923111189900" target="_blank" class="w-10 h-10 bg-[#25D366] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-6 h-6"></a>
        </div>
    </div>

    <main class="max-w-7xl mx-auto flex-grow w-full p-6 md:p-10">
        <!-- Header -->
        <header class="mb-12 border-b border-slate-800/50 pb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent inline-block">
                    CodeMagic A<span class="i-container text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">i<span class="i-dot animate-pulse"></span></span>
                </h1>
                <p class="text-slate-600 text-[11px] mt-1.5 uppercase tracking-[0.4em]">Advanced File & Theme Engine</p>
            </div>
            <div class="flex items-center gap-2 text-[10px] text-emerald-400 font-bold bg-emerald-950/30 px-4 py-2 rounded-full border border-emerald-500/20">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="tracking-widest uppercase">System Online</span>
            </div>
        </header>

        <!-- Main Container -->
        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <!-- Action Buttons Row -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <button onclick="handleSend('clone')" class="btn-magic bg-blue-600 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">🌐 Clone Website</button>
                <button onclick="handleSend('layout')" class="btn-magic bg-emerald-600 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/20">🥞 Layout 2 Code</button>
                <button onclick="handleSend('debug')" class="btn-magic bg-[#1e293b] py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 border border-slate-700">👾 Neural Debug</button>
                <button onclick="handleSend('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-indigo-900/20">🪄 WP Detect</button>
            </div>

            <!-- Tech Selector Row -->
            <div class="mb-10 px-4">
                <div class="tech-pill-container">
                    <button onclick="selectTech(this, 'elementor')" onmouseleave="revertTech(this)" class="tech-btn">Elementor</button>
                    <button onclick="selectTech(this, 'tailwind')" onmouseleave="revertTech(this)" class="tech-btn">Tailwind</button>
                    <button onclick="selectTech(this, 'react')" onmouseleave="revertTech(this)" class="tech-btn">React / Next.js</button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em]">Input Terminal</label>
                <div class="bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 flex items-center gap-2">
                    <label for="fileInput" class="cursor-pointer text-[10px] font-bold text-slate-300">📎 ATTACH FILE / LAYOUT</label>
                    <input type="file" id="fileInput" class="hidden">
                </div>
            </div>

            <textarea id="userInput" class="w-full h-80 bg-[#020617] border border-slate-800/50 rounded-3xl p-8 text-sm font-mono focus:border-blue-500/50 outline-none custom-scrollbar" placeholder="Describe layout, paste code, or enter URL..."></textarea>
        </div>
    </main>

    <footer class="mt-auto py-8 border-t border-slate-800/50 bg-slate-950/30">
        <div class="max-w-7xl mx-auto px-10 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-slate-500 text-xs uppercase tracking-widest">© 2026 CodeMagic Ai | Official Theme Engine</p>
            <div class="flex gap-8 text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                <a href="#" class="hover:text-blue-400 transition-colors">Documentation</a>
                <a href="#" class="hover:text-blue-400 transition-colors">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <script>
        const inner = document.getElementById('cursor-inner');
        const outer = document.getElementById('cursor-outer');
        let selectedEnv = 'elementor';

        document.addEventListener('mousemove', (e) => {
            inner.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            outer.style.transform = `translate3d(${e.clientX - 8}px, ${e.clientY - 8}px, 0)`;
        });

        function selectTech(el, tech) {
            selectedEnv = tech;
            el.classList.add('tech-active');
        }

        function revertTech(el) {
            el.classList.remove('tech-active');
        }

        function toggleSocial() {
            const opt = document.getElementById('socialOptions');
            const chat = document.getElementById('chatIcon');
            const close = document.getElementById('closeIcon');
            opt.classList.toggle('show');
            chat.classList.toggle('hidden'); close.classList.toggle('hidden');
        }

        function closeChat() {
            const opt = document.getElementById('socialOptions');
            const chat = document.getElementById('chatIcon');
            const close = document.getElementById('closeIcon');
            if(opt.classList.contains('show')) {
                opt.classList.remove('show');
                chat.classList.remove('hidden');
                close.classList.add('hidden');
            }
        }

        async function handleSend(mode) {
            // Processing logic remains same
        }
    </script>
</body>
</html>
