<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    
    <link rel="icon" href="https://fav.farm/🪄" />

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #050a15; 
            color: white; 
            font-family: sans-serif; 
            cursor: auto; 
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        /* --- SINGLE MAGNETIC CURSOR (AS REQUESTED) --- */
        #magic-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(59, 130, 246, 0.5);
            background-color: rgba(59, 130, 246, 0.05);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            left: 0;
            top: 0;
            transform: translate(-50%, -50%);
            will-change: transform;
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        body.hovering-effect #magic-cursor {
            width: 60px;
            height: 60px;
            background-color: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.6);
        }

        /* --- LOGO & UI ELEMENTS --- */
        .brand-logo {
            display: inline-block;
            transition: all 0.4s ease;
        }
        .brand-logo:hover {
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4));
        }
        
        .i-container {
            position: relative;
            display: inline-block;
        }
        
        .i-dot {
            position: absolute;
            top: -2px; 
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .btn-magic {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-magic:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3);
        }
        .btn-magic::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .btn-magic:hover::after {
            left: 100%;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <div id="magic-cursor"></div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-12 border-b border-slate-800/50 pb-8 flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <div class="brand-logo cursor-default">
                    <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 bg-clip-text text-transparent inline-block tracking-tight">
                        CodeMagic A<span class="i-container text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">i<span class="i-dot animate-pulse"></span></span>
                        <span class="text-slate-600 text-xl font-light tracking-normal ml-1">Enterprise <span class="text-xs italic opacity-60">v2.5</span></span>
                    </h1>
                </div>
                <p class="text-slate-600 text-[11px] mt-1.5 uppercase tracking-[0.4em] font-medium cursor-default">Advanced File & Theme Engine</p>
            </div>
            
            <div id="status" class="flex items-center gap-2.5 text-[11px] text-emerald-400 font-mono bg-emerald-950/50 px-4 py-2 rounded-full border border-emerald-500/20 mb-1 cursor-default">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="uppercase tracking-widest font-bold">System Online</span>
            </div>
        </header>

        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest cursor-default font-mono">Input Terminal</label>
                <div class="flex items-center gap-2.5">
                    <div id="fileBox" class="bg-slate-900 px-4 py-2.5 rounded-xl border border-slate-800 flex items-center gap-2.5 transition-all hover:border-blue-500/50">
                        <label for="fileInput" class="cursor-pointer text-[11px] font-bold text-slate-300" id="labelTxt">📎 ATTACH FILE / LAYOUT</label>
                        <button id="remBtn" onclick="removeFile()" class="hidden text-red-500 font-bold ml-1 text-sm">✕</button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" onchange="updateFile()">
                    <span id="fName" class="text-[11px] text-blue-400 italic max-w-[150px] truncate"></span>
                </div>
            </div>

            <textarea id="userInput" class="w-full h-72 bg-slate-950 border border-slate-800 rounded-3xl p-8 text-sm font-mono focus:ring-0 focus:border-blue-500 outline-none custom-scrollbar transition-all" placeholder="Describe layout or paste URL..."></textarea>

            <div class="mt-10 grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="flex flex-col">
                    <span class="text-[11px] text-slate-500 mb-2.5 uppercase font-bold tracking-tight">Environment</span>
                    <select id="targetEditor" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm outline-none text-white cursor-pointer">
                        <option value="elementor">WordPress (Elementor)</option>
                        <option value="tailwind">Tailwind CSS</option>
                        <option value="react">React / Next.js</option>
                    </select>
                </div>
                <button onclick="send('clone')" class="btn-magic bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-blue-950/30">🚀 Clone Website</button>
                <button onclick="send('layout')" class="btn-magic bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-emerald-950/30">🎨 Layout to Code</button>
                <button onclick="send('debug')" class="btn-magic bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold text-sm mt-auto">🔍 Fix My Bug</button>
                <button onclick="send('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-sm mt-auto">🕵️ WP Detect</button>
            </div>
        </div>

        <div id="loading" class="hidden mt-12 text-center animate-pulse">
            <div class="inline-block h-7 w-7 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-3"></div>
            <p class="text-blue-400 text-xs font-mono tracking-[0.3em] uppercase">Neural Engine Active...</p>
        </div>

        <div id="resBox" class="hidden mt-12 pb-10">
            <div class="flex justify-between items-center mb-3 px-3">
                <span class="text-[11px] text-slate-600 uppercase font-bold tracking-widest font-mono">Console Output</span>
                <button onclick="copyCode()" class="text-[11px] text-blue-400 hover:underline">Copy All</button>
            </div>
            <div id="result" class="bg-slate-950 border border-slate-900 p-10 rounded-[2.5rem] font-mono text-xs text-emerald-500/80 leading-relaxed overflow-x-auto shadow-inner custom-scrollbar"></div>
        </div>
    </div>

    <script>
        const follower = document.getElementById('magic-cursor');
        let mX = 0, mY = 0, fX = 0, fY = 0;
        document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; });
        function move() {
            fX += (mX - fX) * 0.18; fY += (mY - fY) * 0.18;
            follower.style.transform = `translate3d(${fX}px, ${fY}px, 0) translate(-50%, -50%)`;
            requestAnimationFrame(move);
        }
        move();

        document.querySelectorAll('button, select, label, .brand-logo').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering-effect'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering-effect'));
        });

        function updateFile() {
            const inp = document.getElementById('fileInput');
            if(inp.files[0]) {
                document.getElementById('fName').innerText = `[${inp.files[0].name}]`;
                document.getElementById('remBtn').classList.remove('hidden');
                document.getElementById('labelTxt').innerText = "CHANGE FILE";
            }
        }
        function removeFile() {
            document.getElementById('fileInput').value = "";
            document.getElementById('fName').innerText = "";
            document.getElementById('remBtn').classList.add('hidden');
            document.getElementById('labelTxt').innerText = "ATTACH FILE / LAYOUT";
        }
        async function send(mode) {
            const text = document.getElementById('userInput').value;
            if(!text) return alert("Input terminal empty!");
            
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resBox').classList.add('hidden');
            
            const formData = new FormData();
            formData.append('text', text);
            formData.append('mode', mode);
            formData.append('editor', document.getElementById('targetEditor').value);

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const data = await response.json();
                const result = document.getElementById('result');
                if(data.status === "success") {
                    if(mode === 'wp_detect') {
                        result.innerHTML = `<span class='text-blue-400'>THEME:</span> ${data.theme}<br><br><span class='text-blue-400'>PLUGINS:</span><br>${data.plugins.join(', ')}`;
                    } else {
                        result.innerText = data.result;
                    }
                } else { result.innerText = "Error: " + data.result; }
                document.getElementById('resBox').classList.remove('hidden');
            } catch (e) { alert("Server connection error."); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }
        function copyCode() { navigator.clipboard.writeText(document.getElementById('result').innerText); alert("Copied!"); }
    </script>
</body>
</html>
