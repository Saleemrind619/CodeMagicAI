<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    <link rel="icon" href="https://fav.farm/🪄" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; cursor: none; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-panel { background: rgba(15, 23, 42, 0.2); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); border-radius: 40px; }
        
        #cursor-outer, #cursor-inner { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; border-radius: 50%; will-change: transform; transition: transform 0.08s ease-out; }
        #cursor-inner { width: 6px; height: 6px; background: #10b981; }
        #cursor-outer { width: 25px; height: 25px; border: 1px solid rgba(16, 185, 129, 0.4); }

        .tech-pill-bar { background: rgba(2, 6, 23, 0.6); border: 1px solid rgba(255,255,255,0.05); border-radius: 100px; padding: 4px; display: flex; width: fit-content; margin: 20px auto; }
        .tech-item { padding: 12px 40px; border-radius: 100px; font-size: 9px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease; cursor: pointer; }
        .tech-item:hover, .tech-item.active { color: #3b82f6; background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }

        .btn-main { transition: all 0.3s ease; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; border-radius: 14px; }
        
        #socialOptions.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        
        .logo-text { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        .ai-highlight { color: #3b82f6; position: relative; }
        .ai-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; display: inline-block; margin-left: 2px; box-shadow: 0 0 10px #10b981; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="cursor-outer"></div>
    <div id="cursor-inner"></div>

    <!-- Header -->
    <header class="max-w-7xl mx-auto w-full flex justify-between items-start mb-12">
        <div class="flex flex-col gap-1">
            <div class="flex items-center gap-4">
                <h1 class="logo-text text-white">CodeMagic <span class="ai-highlight">AI<span class="ai-dot"></span></span></h1>
                <div class="h-6 w-[1px] bg-slate-800 mx-2"></div>
                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mt-2">Enterprise V0.2</span>
            </div>
            <p class="text-slate-600 text-[9px] uppercase tracking-[0.4em] ml-1 mt-2">_ Advanced File & Theme Engine</p>
        </div>
        
        <div class="border border-emerald-500/20 bg-emerald-500/5 px-6 py-2.5 rounded-full flex items-center gap-3">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></span>
            <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">System Online</span>
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-7xl mx-auto w-full flex-grow">
        <div class="glass-panel p-8 md:p-12 shadow-2xl relative">
            <div class="flex justify-between items-center mb-6 px-2">
                <div class="flex items-center gap-2">
                    <span class="text-blue-500 font-bold">_</span>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Input Terminal</label>
                </div>
                <button class="bg-slate-900/50 border border-slate-800/50 px-5 py-2 rounded-lg text-[9px] font-bold text-slate-400 hover:text-white transition-all">
                    <i class="fas fa-paperclip mr-2"></i> ATTACH FILE / LAYOUT
                </button>
            </div>

            <textarea id="userInput" class="w-full h-80 bg-[#020617]/40 border border-slate-800/40 rounded-[2.5rem] p-10 text-sm font-mono text-slate-300 focus:border-blue-500/20 outline-none resize-none transition-all" placeholder="Enter Neural Target URL or Payload Structure..."></textarea>

            <!-- Main Buttons -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-10">
                <button class="btn-main bg-blue-600 h-14 shadow-lg shadow-blue-900/20"><i class="fas fa-globe"></i> Clone Website</button>
                <button class="btn-main bg-emerald-600 h-14 shadow-lg shadow-emerald-900/20"><i class="fas fa-layer-group"></i> Layout 2 Code</button>
                <button class="btn-main bg-slate-800/50 h-14 border border-slate-700"><i class="fas fa-bug text-yellow-500"></i> Neural Debug</button>
                <button class="btn-main bg-indigo-600 h-14 shadow-lg shadow-indigo-900/20"><i class="fas fa-magic"></i> WP Detect</button>
            </div>

            <!-- Tech Bar -->
            <div class="tech-pill-bar mt-6">
                <div onclick="setEnv(this)" class="tech-item active">Elementor</div>
                <div onclick="setEnv(this)" class="tech-item">Tailwind</div>
                <div onclick="setEnv(this)" class="tech-item">React / Next.js</div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-10 w-full">
        <div class="flex flex-col items-center gap-4">
            <div class="flex gap-6 text-[9px] font-bold text-slate-500 uppercase tracking-widest">
                <span>© 2026 CodeMagic Ai</span>
                <span class="text-slate-800">|</span>
                <a href="#" class="hover:text-blue-500 transition-colors">Documentation</a>
                <span class="text-slate-800">|</span>
                <a href="#" class="hover:text-blue-500 transition-colors">Privacy</a>
            </div>
        </div>
    </footer>

    <!-- Social Chat -->
    <div onmouseleave="closeSocials()" class="fixed bottom-10 right-10 z-[100] flex flex-col-reverse items-center gap-4">
        <button onclick="toggleSocials()" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-all">
            <i class="fas fa-comment-alt text-white"></i>
        </button>
        <div id="socialOptions" class="flex flex-col gap-3 opacity-0 pointer-events-none translate-y-10 transition-all duration-500">
            <a href="https://wa.me/923111189900" target="_blank" class="w-12 h-12 bg-[#25D366] rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-whatsapp text-white text-xl"></i></a>
            <a href="https://facebook.com/saleemahmadrind" target="_blank" class="w-12 h-12 bg-[#1877F2] rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-facebook-f text-white text-lg"></i></a>
            <a href="https://instagram.com/saleemrind619" target="_blank" class="w-12 h-12 bg-gradient-to-tr from-yellow-400 to-purple-600 rounded-full flex items-center justify-center shadow-lg"><i class="fab fa-instagram text-white text-lg"></i></a>
        </div>
    </div>

    <script>
        const i = document.getElementById('cursor-inner'), o = document.getElementById('cursor-outer');
        document.addEventListener('mousemove', (e) => {
            i.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            o.style.transform = `translate3d(${e.clientX - 12}px, ${e.clientY - 12}px, 0)`;
        });

        function toggleSocials() { document.getElementById('socialOptions').classList.toggle('show'); }
        function closeSocials() { document.getElementById('socialOptions').classList.remove('show'); }

        function setEnv(el) {
            document.querySelectorAll('.tech-item').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 1500); 
        }
    </script>
</body>
</html>
