<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    
    <link rel="icon" href="https://fav.farm/🪄" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { 
            background-color: #050a15; 
            color: white; 
            font-family: sans-serif; 
            cursor: default; 
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        /* --- DOUBLE CIRCLE CURSOR --- */
        #cursor-outer, #cursor-inner {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
            will-change: transform;
            transition: transform 0.05s linear; 
        }
        #cursor-inner {
            width: 10px; height: 10px;
            border: 1.5px solid #10b981;
            background-color: rgba(16, 185, 129, 0.2);
        }
        #cursor-outer {
            width: 25px; height: 25px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            transition: transform 0.1s ease-out, width 0.3s, height 0.3s;
        }
        body.hovering-effect #cursor-outer {
            width: 40px; height: 40px;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        /* --- WHATSAPP FLOATING BUTTON --- */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .whatsapp-float:hover {
            transform: scale(1.1) rotate(10deg);
            background-color: #20ba5a;
        }
        .whatsapp-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #25d366;
            border-radius: 50%;
            z-index: -1;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* --- LOGO ANIMATION --- */
        .i-container { position: relative; display: inline-block; }
        .i-dot {
            position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background-color: #10b981; border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .btn-magic {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .btn-magic:hover { transform: translateY(-3px); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="cursor-outer"></div>
    <div id="cursor-inner"></div>

    <a href="https://wa.me/YOUR_NUMBER" class="whatsapp-float" target="_blank">
        <div class="whatsapp-pulse"></div>
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <main class="max-w-7xl mx-auto flex-grow w-full p-6 md:p-10">
        <header class="mb-12 border-b border-slate-800/50 pb-8 flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <div class="brand-logo">
                    <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 bg-clip-text text-transparent inline-block tracking-tight">
                        CodeMagic A<span class="i-container text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">i<span class="i-dot animate-pulse"></span></span>
                    </h1>
                </div>
                <p class="text-slate-600 text-[11px] mt-1.5 uppercase tracking-[0.4em] font-medium">Advanced File & Theme Engine</p>
            </div>
            <div class="text-[11px] text-emerald-400 font-mono bg-emerald-950/50 px-4 py-2 rounded-full border border-emerald-500/20 mb-1">
                <span class="animate-pulse">●</span> SYSTEM ONLINE
            </div>
        </header>

        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest font-mono">Input Terminal</label>
                <div class="flex items-center gap-2.5">
                    <div class="bg-slate-900 px-4 py-2.5 rounded-xl border border-slate-800 flex items-center gap-2">
                        <label for="fileInput" class="cursor-pointer text-[11px] font-bold text-slate-300" id="labelTxt">📎 ATTACH FILE / LAYOUT</label>
                        <button id="remBtn" onclick="removeFile()" class="hidden text-red-500 font-bold ml-1">✕</button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" onchange="updateFile()">
                    <span id="fName" class="text-[11px] text-blue-400 italic truncate max-w-[100px]"></span>
                </div>
            </div>

            <textarea id="userInput" class="w-full h-72 bg-slate-950 border border-slate-800 rounded-3xl p-8 text-sm font-mono focus:border-blue-500 outline-none custom-scrollbar transition-all" placeholder="Describe layout or paste URL..."></textarea>

            <div class="mt-10 grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="flex flex-col">
                    <span class="text-[11px] text-slate-500 mb-2.5 uppercase font-bold tracking-tight">Environment</span>
                    <select id="targetEditor" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm outline-none cursor-pointer">
                        <option value="elementor">WordPress (Elementor)</option>
                        <option value="tailwind">Tailwind CSS</option>
                        <option value="react">React / Next.js</option>
                    </select>
                </div>
                <button onclick="send('clone')" class="btn-magic bg-blue-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-blue-950/30 hover:bg-blue-500">🚀 Clone Website</button>
                <button onclick="send('layout')" class="btn-magic bg-emerald-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-emerald-950/30 hover:bg-emerald-500">🎨 Layout to Code</button>
                <button onclick="send('debug')" class="btn-magic bg-slate-800 py-4 rounded-2xl font-bold text-sm mt-auto hover:bg-slate-700">🔍 Fix My Bug</button>
                <button onclick="send('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-sm mt-auto hover:bg-indigo-500">🕵️ WP Detect</button>
            </div>
        </div>

        <div id="loading" class="hidden mt-12 text-center">
            <p class="text-blue-400 text-xs font-mono tracking-[0.3em] animate-pulse">Neural Engine Active...</p>
        </div>

        <div id="resBox" class="hidden mt-12 pb-10">
            <div id="result" class="bg-slate-950 border border-slate-900 p-10 rounded-[2.5rem] font-mono text-xs text-emerald-500/80 overflow-x-auto custom-scrollbar"></div>
        </div>
    </main>

    <footer class="mt-auto py-8 border-t border-slate-800/50 bg-slate-950/30 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-slate-500 text-xs uppercase tracking-widest font-medium">
                © 2026 CodeMagic Ai | Developed by <span class="text-blue-400">Aks-e-Haq</span>
            </p>
            <div class="flex gap-6 text-slate-500 text-xs font-bold uppercase tracking-tighter">
                <a href="#" class="hover:text-blue-400 transition-colors">Documentation</a>
                <a href="#" class="hover:text-blue-400 transition-colors">API Status</a>
                <a href="#" class="hover:text-blue-400 transition-colors">Privacy</a>
            </div>
        </div>
    </footer>

    <script>
        const inner = document.getElementById('cursor-inner');
        const outer = document.getElementById('cursor-outer');
        
        document.addEventListener('mousemove', (e) => {
            inner.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            outer.style.transform = `translate3d(${e.clientX - 8}px, ${e.clientY - 8}px, 0)`;
        });

        document.querySelectorAll('button, select, label, textarea, .brand-logo, a').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering-effect'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering-effect'));
        });

        function updateFile() {
            const inp = document.getElementById('fileInput');
            if(inp.files[0]) {
                document.getElementById('fName').innerText = `[${inp.files[0].name}]`;
                document.getElementById('remBtn').classList.remove('hidden');
                document.getElementById('labelTxt').innerText = "CHANGE FILE";
            }
        }
        function removeFile() {
            document.getElementById('fileInput').value = "";
            document.getElementById('fName').innerText = "";
            document.getElementById('remBtn').classList.add('hidden');
            document.getElementById('labelTxt').innerText = "ATTACH FILE / LAYOUT";
        }
        
        // --- API SEND FUNCTION ---
        async function send(mode) {
            const text = document.getElementById('userInput').value;
            if(!text) return alert("Input empty!");
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resBox').classList.add('hidden');
            const formData = new FormData();
            formData.append('text', text);
            formData.append('mode', mode);
            formData.append('editor', document.getElementById('targetEditor').value);
            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const data = await response.json();
                const result = document.getElementById('result');
                if(data.status === "success") { result.innerText = data.result; }
                else { result.innerText = "Error: " + data.result; }
                document.getElementById('resBox').classList.remove('hidden');
            } catch (e) { alert("Server error."); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }
    </script>
</body>
</html>
