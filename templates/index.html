<!-- Update inside the grid container in your code -->
<div class="mt-10 grid grid-cols-1 md:grid-cols-5 gap-4">
    <div class="flex flex-col">
        <span class="text-[11px] text-slate-500 mb-2.5 uppercase font-bold tracking-tight">Environment</span>
        <select id="targetEditor" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm outline-none cursor-pointer text-white">
            <option value="elementor">WordPress (Elementor)</option>
            <option value="tailwind">Tailwind CSS</option>
            <option value="react">React / Next.js</option>
        </select>
    </div>
    
    <!-- Button 1 -->
    <button onclick="handleSend('clone')" class="btn-magic bg-blue-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-blue-950/30">🚀 Clone Website</button>
    
    <!-- Button 2 -->
    <button onclick="handleSend('layout')" class="btn-magic bg-emerald-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-emerald-950/30">🎨 Layout to Code</button>
    
    <!-- Button 3: Fix My Bug -->
    <button onclick="handleSend('debug')" class="btn-magic bg-slate-800 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-slate-950/30">🔍 Fix My Bug</button>
    
    <!-- Button 4: WP Detect (Now after Fix My Bug) -->
    <button onclick="handleSend('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-indigo-950/30">🕵️ WP Detect</button>
</div>
