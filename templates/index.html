<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI - WP Detector</title>
    <style>
        :root { --primary: #10b981; --dark: #0d1117; --card: #161b22; }
        body { background-color: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; }
        .search-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #30363d; }
        input { width: 70%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { padding: 12px 25px; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        .result-area { margin-top: 30px; display: none; text-align: left; background: var(--card); padding: 20px; border-radius: 10px; }
        .plugin-tag { display: inline-block; background: #21262d; padding: 5px 12px; margin: 5px; border-radius: 20px; border: 1px solid var(--primary); font-size: 13px; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        footer { margin-top: 50px; color: #888; padding: 20px; border-top: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>CodeMagic AI - WP Detector</h1>
    <p>Detect Themes & Plugins from any WordPress Site</p>
    
    <div class="search-box">
        <input type="text" id="siteUrl" placeholder="Enter Website URL (e.g. example.com)">
        <button onclick="detectSite()">Analyze Site</button>
    </div>

    <div id="loading" style="display:none; margin-top:20px;">Scanning Website... Please wait.</div>

    <div id="resultArea" class="result-area">
        <h3>Theme: <span id="themeName" style="color:var(--primary);"></span></h3>
        <h4>Detected Plugins:</h4>
        <div id="pluginList"></div>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <button onclick="downloadPluginList()" style="background:#238636;">Download Plugin List (.txt)</button>
        <button onclick="addManualPlugin()" style="background:#30363d; margin-left:10px;">+ Add Manual Plugin</button>
    </div>
</div>

<footer>
    <p>&copy; 2026 CodeMagic AI</p>
    <a href="#" style="color:var(--primary); text-decoration:none;">Privacy Policy</a>
</footer>

<a href="https://wa.me/923111189900" class="wa-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</a>

<script>
    let currentPlugins = [];

    async function detectSite() {
        const url = document.getElementById('siteUrl').value;
        if(!url) return alert("Please enter a URL");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('resultArea').style.display = 'none';

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            });
            const data = await response.json();
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            
            document.getElementById('themeName').innerText = data.theme;
            currentPlugins = data.plugins;
            displayPlugins();
        } catch (e) {
            alert("Connection Error");
            document.getElementById('loading').style.display = 'none';
        }
    }

    function displayPlugins() {
        const container = document.getElementById('pluginList');
        container.innerHTML = currentPlugins.map(p => `<span class="plugin-tag">${p}</span>`).join('');
    }

    function addManualPlugin() {
        const name = prompt("Enter Plugin Name:");
        if(name) {
            currentPlugins.push(name);
            displayPlugins();
        }
    }

    function downloadPluginList() {
        const text = `Theme: ${document.getElementById('themeName').innerText}\nPlugins List:\n` + currentPlugins.join('\n');
        const blob = new Blob([text], {type: 'text/plain'});
        const anchor = document.createElement('a');
        anchor.download = 'plugins-list.txt';
        anchor.href = (window.webkitURL || window.URL).createObjectURL(blob);
        anchor.click();
    }
</script>
</body>
</html>
