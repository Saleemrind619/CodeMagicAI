<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a15; color: white; font-family: sans-serif; overflow-x: hidden; cursor: none; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* --- DOUBLE MAGNETIC CURSOR --- */
        #cursor-outer { position: fixed; width: 40px; height: 40px; border: 1px solid rgba(59, 130, 246, 0.4); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.15s ease-out, width 0.3s, height 0.3s; }
        #cursor-inner { position: fixed; width: 6px; height: 6px; background: #10b981; border-radius: 50%; pointer-events: none; z-index: 10000; box-shadow: 0 0 10px #10b981; }
        body.hovering #cursor-outer { width: 60px; height: 60px; background: rgba(59, 130, 246, 0.1); border-color: #10b981; }

        .btn-magic { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-magic:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">
    <div id="cursor-outer"></div>
    <div id="cursor-inner"></div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-12 border-b border-slate-800/50 pb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">CodeMagic AI</h1>
                <p class="text-slate-600 text-[10px] uppercase tracking-[0.5em] mt-2">Neural Enterprise v2.5</p>
            </div>
            <div class="text-emerald-400 text-[10px] font-mono bg-emerald-950/30 px-4 py-2 rounded-full border border-emerald-500/20">SYSTEM ACTIVE</div>
        </header>

        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest font-mono">Terminal</label>
                <div class="flex items-center gap-3">
                    <div class="bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 flex items-center gap-2">
                        <label for="fileInput" class="cursor-pointer text-[11px] font-bold text-slate-300" id="lTxt">📎 ATTACH FILE / LAYOUT</label>
                        <button id="remBtn" onclick="removeFile()" class="hidden text-red-500 font-bold ml-1">✕</button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" onchange="updateFile()">
                    <span id="fName" class="text-[11px] text-blue-400 italic"></span>
                </div>
            </div>
            
            <textarea id="userInput" class="w-full h-64 bg-slate-950 border border-slate-800 rounded-3xl p-8 text-sm font-mono focus:border-blue-500 outline-none text-emerald-500/80 custom-scroll" placeholder="Enter URL or describe layout..."></textarea>

            <div class="mt-10 grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="flex flex-col">
                    <span class="text-[10px] text-slate-500 mb-2 uppercase font-bold">Stack</span>
                    <select id="targetEditor" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm outline-none cursor-pointer">
                        <option value="elementor">WordPress (Elementor)</option>
                        <option value="tailwind">Tailwind CSS</option>
                        <option value="react">React / Next.js</option>
                    </select>
                </div>
                <button onclick="send('clone')" class="btn-magic bg-blue-600 py-4 rounded-2xl font-bold text-sm mt-auto">🚀 Clone Website</button>
                <button onclick="send('layout')" class="btn-magic bg-emerald-600 py-4 rounded-2xl font-bold text-sm mt-auto">🎨 Layout to Code</button>
                <button onclick="send('debug')" class="btn-magic bg-slate-800 py-4 rounded-2xl font-bold text-sm mt-auto">🔍 Fix Bug</button>
                <button onclick="send('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-sm mt-auto">🕵️ WP Detect</button>
            </div>
        </div>

        <div id="loading" class="hidden mt-10 text-center animate-pulse"><p class="text-blue-400 text-[10px] font-mono tracking-widest uppercase">Initializing Neural Request...</p></div>

        <div id="resBox" class="hidden mt-12 pb-20">
            <div class="flex justify-between px-4 mb-2"><span class="text-[10px] text-slate-600 uppercase font-bold">Console Output</span><button onclick="copyCode()" class="text-[10px] text-blue-400">COPY</button></div>
            <div id="result" class="bg-slate-950 border border-slate-900 p-8 rounded-[2rem] font-mono text-xs text-emerald-500/70 overflow-x-auto shadow-inner"></div>
        </div>
    </div>

    <script>
        // --- DOUBLE CURSOR LOGIC ---
        const outer = document.getElementById('cursor-outer');
        const inner = document.getElementById('cursor-inner');
        document.addEventListener('mousemove', e => {
            const x = e.clientX; const y = e.clientY;
            inner.style.left = x + 'px'; inner.style.top = y + 'px';
            outer.style.left = (x - 20) + 'px'; outer.style.top = (y - 20) + 'px';
        });

        document.querySelectorAll('button, select, label').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        // --- FILE FUNCTIONS ---
        function updateFile() {
            const inp = document.getElementById('fileInput');
            if(inp.files[0]) {
                document.getElementById('fName').innerText = `[${inp.files[0].name}]`;
                document.getElementById('remBtn').classList.remove('hidden');
                document.getElementById('lTxt').innerText = "CHANGE FILE";
            }
        }
        function removeFile() {
            document.getElementById('fileInput').value = "";
            document.getElementById('fName').innerText = "";
            document.getElementById('remBtn').classList.add('hidden');
            document.getElementById('lTxt').innerText = "ATTACH FILE / LAYOUT";
        }

        // --- BACKEND CALL ---
        async function send(mode) {
            const text = document.getElementById('userInput').value;
            if(!text) return alert("Please provide input.");
            
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resBox').classList.add('hidden');

            const fd = new FormData();
            fd.append('text', text); fd.append('mode', mode);
            fd.append('editor', document.getElementById('targetEditor').value);

            try {
                const res = await fetch('/process', { method: 'POST', body: fd });
                const data = await res.json();
                const result = document.getElementById('result');
                
                if(mode === 'wp_detect' && data.status === "success") {
                    result.innerHTML = `<span class='text-blue-400'>THEME:</span> ${data.theme}<br><br><span class='text-blue-400'>PLUGINS:</span><br>${data.plugins.join(', ')}`;
                } else {
                    result.innerText = data.result;
                }
                document.getElementById('resBox').classList.remove('hidden');
            } catch (e) { alert("Server Error"); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }
        function copyCode() { navigator.clipboard.writeText(document.getElementById('result').innerText); alert("Copied!"); }
    </script>
</body>
</html>
