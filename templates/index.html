<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    <link rel="icon" href="https://fav.farm/🪄" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; cursor: none; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        .glass-panel { background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); border-radius: 40px; }
        
        /* Custom Cursor */
        #cursor-outer, #cursor-inner { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; border-radius: 50%; will-change: transform; transition: transform 0.08s ease-out; }
        #cursor-inner { width: 6px; height: 6px; background: #10b981; }
        #cursor-outer { width: 25px; height: 25px; border: 1px solid rgba(16, 185, 129, 0.4); }

        /* Tech Pill Styles */
        .tech-pill-bar { background: rgba(2, 6, 23, 0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 100px; padding: 4px; display: flex; gap: 10px; width: fit-content; margin: 20px auto; }
        .tech-item { padding: 10px 35px; border-radius: 100px; font-size: 9px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 1.5px; transition: all 0.3s ease; border: 1px solid transparent; cursor: pointer; }
        .tech-item:hover, .tech-item.active { color: #3b82f6; background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }

        .btn-main { transition: all 0.3s ease; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 14px; }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.1); }

        #socialOptions.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .status-badge { border: 1px solid rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="cursor-outer"></div>
    <div id="cursor-inner"></div>

    <!-- Top Header Section -->
    <header class="max-w-7xl mx-auto w-full flex justify-between items-center mb-10 px-4">
        <div class="flex items-center gap-6">
            <h1 class="text-3xl font-black tracking-tighter text-blue-500">CodeMagic AI<span class="text-emerald-400">.</span></h1>
            <div class="h-4 w-[1px] bg-slate-800"></div>
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em]">Enterprise V0.2</span>
        </div>
        <div class="status-badge px-5 py-2 rounded-full flex items-center gap-3">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></span>
            <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">System Online</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full flex-grow">
        <div class="glass-panel p-8 md:p-12 shadow-2xl relative overflow-hidden">
            <!-- Terminal Header -->
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <span class="text-blue-500 font-bold">_</span>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Input Terminal</label>
                </div>
                <button class="bg-slate-900/80 border border-slate-800 px-4 py-2 rounded-lg text-[9px] font-bold text-slate-400 hover:bg-slate-800 transition-all">
                    <i class="fas fa-paperclip mr-2"></i> ATTACH FILE / LAYOUT
                </button>
            </div>

            <!-- Input Area -->
            <textarea id="userInput" class="w-full h-72 bg-[#020617]/50 border border-slate-800/50 rounded-[2rem] p-8 text-sm font-mono focus:border-blue-500/30 outline-none resize-none transition-all" placeholder="Enter Neural Target URL or Payload Structure..."></textarea>

            <!-- Action Buttons Grid -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-8">
                <button onclick="handleAction('clone')" class="btn-main bg-blue-600 h-14 shadow-lg shadow-blue-900/20"><i class="fas fa-globe"></i> Clone Website</button>
                <button onclick="handleAction('layout')" class="btn-main bg-emerald-600 h-14 shadow-lg shadow-emerald-900/20"><i class="fas fa-layer-group"></i> Layout 2 Code</button>
                <button onclick="handleAction('debug')" class="btn-main bg-[#1e293b] h-14 border border-slate-700/50"><i class="fas fa-bug text-yellow-500"></i> Neural Debug</button>
                <button onclick="handleAction('wp')" class="btn-main bg-indigo-600 h-14 shadow-lg shadow-indigo-900/20"><i class="fas fa-magic"></i> WP Detect</button>
            </div>

            <!-- Environment Pill Selector -->
            <div class="tech-pill-bar mt-6">
                <div onclick="setEnv(this)" class="tech-item active">Elementor</div>
                <div onclick="setEnv(this)" class="tech-item">Tailwind</div>
                <div onclick="setEnv(this)" class="tech-item">React / Next.js</div>
            </div>
        </div>
    </main>

    <!-- Social Chat Widget -->
    <div onmouseleave="closeSocials()" class="fixed bottom-8 right-8 z-[100] flex flex-col-reverse items-center gap-4">
        <button onclick="toggleSocials()" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-all">
            <i id="chatIco" class="fas fa-comment-alt text-xl text-white"></i>
        </button>
        <div id="socialOptions" class="flex flex-col gap-3 opacity-0 pointer-events-none translate-y-10 transition-all duration-500">
            <a href="https://wa.me/923111189900" target="_blank" class="w-12 h-12 bg-[#25D366] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><i class="fab fa-whatsapp text-xl text-white"></i></a>
            <a href="https://facebook.com/saleemahmadrind" target="_blank" class="w-12 h-12 bg-[#1877F2] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><i class="fab fa-facebook-f text-xl text-white"></i></a>
            <a href="https://instagram.com/saleemrind619" target="_blank" class="w-12 h-12 bg-gradient-to-tr from-yellow-400 to-purple-600 rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform"><i class="fab fa-instagram text-xl text-white"></i></a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-10 py-6 border-t border-slate-900 flex flex-col md:flex-row justify-between items-center px-10 gap-4">
        <p class="text-[9px] font-bold text-slate-600 uppercase tracking-[0.4em]">© 2026 CodeMagic Ai | Enterprise Edition</p>
        <div class="flex gap-8">
            <a href="#" class="text-[9px] font-bold text-slate-600 uppercase tracking-widest hover:text-blue-500 transition-colors">Documentation</a>
            <a href="#" class="text-[9px] font-bold text-slate-600 uppercase tracking-widest hover:text-blue-500 transition-colors">Privacy</a>
        </div>
    </footer>

    <script>
        // Cursor Movement
        const i = document.getElementById('cursor-inner'), o = document.getElementById('cursor-outer');
        document.addEventListener('mousemove', (e) => {
            i.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
            o.style.transform = `translate3d(${e.clientX - 12}px, ${e.clientY - 12}px, 0)`;
        });

        // Social Toggle
        function toggleSocials() { document.getElementById('socialOptions').classList.toggle('show'); }
        function closeSocials() { document.getElementById('socialOptions').classList.remove('show'); }

        // Env Selector Logic
        function setEnv(el) {
            document.querySelectorAll('.tech-item').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 2000); // Revert after 2s
        }

        function handleAction(type) {
            console.log("Triggered:", type);
            // Add your backend fetch logic here
        }
    </script>
</body>
</html>
