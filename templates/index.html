<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    
    <link rel="icon" href="https://fav.farm/🪄" />

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #050a15; 
            color: white; 
            font-family: sans-serif; 
            cursor: none; /* Hidden because we use custom double circle */
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        /* --- DOUBLE CIRCLE CURSOR --- */
        #cursor-outer, #cursor-inner {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            border-radius: 50%;
            will-change: transform;
        }
        #cursor-outer {
            width: 35px;
            height: 35px;
            border: 1px solid rgba(59, 130, 246, 0.5);
            transition: transform 0.15s ease-out, width 0.3s, height 0.3s, border-color 0.3s;
        }
        #cursor-inner {
            width: 6px;
            height: 6px;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            transition: transform 0.05s linear;
        }

        /* Hover State - Outer circle expands */
        body.hovering-effect #cursor-outer {
            transform: scale(1.8);
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        /* --- LOGO & UI --- */
        .brand-logo { display: inline-block; transition: all 0.4s ease; }
        .brand-logo:hover { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.4)); }
        
        .i-container { position: relative; display: inline-block; }
        .i-dot {
            position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background-color: #10b981; border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        .btn-magic {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .btn-magic:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.3); }
        .btn-magic::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .btn-magic:hover::after { left: 100%; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <div id="cursor-outer"></div>
    <div id="cursor-inner"></div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-12 border-b border-slate-800/50 pb-8 flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <div class="brand-logo">
                    <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 bg-clip-text text-transparent inline-block tracking-tight">
                        CodeMagic A<span class="i-container text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">i<span class="i-dot animate-pulse"></span></span>
                        <span class="text-slate-600 text-xl font-light tracking-normal ml-1">Enterprise <span class="text-xs italic opacity-60">v2.5</span></span>
                    </h1>
                </div>
                <p class="text-slate-600 text-[11px] mt-1.5 uppercase tracking-[0.4em] font-medium">Advanced File & Theme Engine</p>
            </div>
            
            <div id="status" class="flex items-center gap-2.5 text-[11px] text-emerald-400 font-mono bg-emerald-950/50 px-4 py-2 rounded-full border border-emerald-500/20 mb-1">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="uppercase tracking-widest font-bold">System Online</span>
            </div>
        </header>

        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative">
            <div class="flex justify-between items-center mb-6">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest font-mono">Input Terminal</label>
                <div class="flex items-center gap-2.5">
                    <div id="fileBox" class="bg-slate-900 px-4 py-2.5 rounded-xl border border-slate-800 flex items-center gap-2 transition-all">
                        <label for="fileInput" class="cursor-pointer text-[11px] font-bold text-slate-300" id="labelTxt">📎 ATTACH FILE</label>
                        <button id="remBtn" onclick="removeFile()" class="hidden text-red-500 font-bold ml-1">✕</button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" onchange="updateFile()">
                    <span id="fName" class="text-[11px] text-blue-400 italic truncate max-w-[100px]"></span>
                </div>
            </div>

            <textarea id="userInput" class="w-full h-72 bg-slate-950 border border-slate-800 rounded-3xl p-8 text-sm font-mono focus:border-blue-500 outline-none custom-scrollbar transition-all" placeholder="Describe layout or paste URL..."></textarea>

            <div class="mt-10 grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="flex flex-col">
                    <span class="text-[11px] text-slate-500 mb-2.5 uppercase font-bold tracking-tight">Env</span>
                    <select id="targetEditor" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm outline-none cursor-pointer">
                        <option value="elementor">WordPress (Elementor)</option>
                        <option value="tailwind">Tailwind CSS</option>
                        <option value="react">React / Next.js</option>
                    </select>
                </div>
                <button onclick="send('clone')" class="btn-magic bg-blue-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-blue-950/30">🚀 Clone Website</button>
                <button onclick="send('layout')" class="btn-magic bg-emerald-600 py-4 rounded-2xl font-bold text-sm mt-auto shadow-lg shadow-emerald-950/30">🎨 Layout to Code</button>
                <button onclick="send('debug')" class="btn-magic bg-slate-800 py-4 rounded-2xl font-bold text-sm mt-auto">🔍 Fix My Bug</button>
                <button onclick="send('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-sm mt-auto">🕵️ WP Detect</button>
            </div>
        </div>

        <div id="loading" class="hidden mt-12 text-center animate-pulse">
            <p class="text-blue-400 text-xs font-mono tracking-[0.3em] uppercase">Neural Engine Active...</p>
        </div>

        <div id="resBox" class="hidden mt-12 pb-10">
            <div id="result" class="bg-slate-950 border border-slate-900 p-10 rounded-[2.5rem] font-mono text-xs text-emerald-500/80 overflow-x-auto shadow-inner custom-scrollbar"></div>
        </div>
    </div>

    <script>
        // --- DOUBLE CIRCLE LOGIC ---
        const inner = document.getElementById('cursor-inner');
        const outer = document.getElementById('cursor-outer');
        
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Inner follows exactly
            inner.style.transform = `translate3d(${x - 3}px, ${y - 3}px, 0)`;
            // Outer follows with slight delay
            outer.style.transform = `translate3d(${x - 17.5}px, ${y - 17.5}px, 0)`;
        });

        document.querySelectorAll('button, select, label, textarea, .brand-logo').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering-effect'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering-effect'));
        });

        // --- Backend Connection ---
        async function send(mode) {
            const text = document.getElementById('userInput').value;
            if(!text) return alert("Input empty!");
            
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('resBox').classList.add('hidden');
            
            const formData = new FormData();
            formData.append('text', text);
            formData.append('mode', mode);
            formData.append('editor', document.getElementById('targetEditor').value);

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const data = await response.json();
                const result = document.getElementById('result');
                if(data.status === "success") {
                    result.innerText = data.result;
                } else { result.innerText = "Error: " + data.result; }
                document.getElementById('resBox').classList.remove('hidden');
            } catch (e) { alert("Server error."); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }
    </script>
</body>
</html>
