<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMagic AI | Enterprise</title>
    <link rel="icon" href="https://fav.farm/🪄" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050a15; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        #magic-cursor { position: fixed; width: 30px; height: 30px; border: 2px solid rgba(59, 130, 246, 0.5); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); will-change: transform; transition: width 0.3s, height 0.3s, background-color 0.3s; }
        body.hovering-effect #magic-cursor { width: 60px; height: 60px; background-color: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.6); }
        .i-dot { position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }
        .btn-magic { transition: all 0.3s ease; position: relative; overflow: hidden; }
        .btn-magic:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2); }
        .result-box { white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">

    <div id="magic-cursor"></div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-12 border-b border-slate-800/50 pb-8 flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-400 via-indigo-400 to-emerald-400 bg-clip-text text-transparent inline-block tracking-tight">
                    CodeMagic A<span class="relative inline-block text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400">i<span class="i-dot animate-pulse"></span></span>
                    <span class="text-slate-600 text-xl font-light ml-1">Enterprise <span class="text-xs italic opacity-60">v2.5</span></span>
                </h1>
                <p class="text-slate-600 text-[11px] mt-1.5 uppercase tracking-[0.4em] font-medium">Advanced File & Theme Engine</p>
            </div>
            <div class="flex items-center gap-2.5 text-[11px] text-emerald-400 font-mono bg-emerald-950/50 px-4 py-2 rounded-full border border-emerald-500/20">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative rounded-full h-2 w-2 bg-emerald-500"></span></span>
                SYSTEM ONLINE
            </div>
        </header>

        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest font-mono">Input Terminal</label>
                <div class="flex items-center gap-2.5">
                    <div class="bg-slate-900 px-4 py-2.5 rounded-xl border border-slate-800 text-[11px] font-bold text-slate-300">
                        <label for="fileInput" class="cursor-pointer">📎 ATTACH LAYOUT</label>
                    </div>
                    <input type="file" id="fileInput" class="hidden">
                </div>
            </div>

            <textarea id="userInput" class="w-full h-64 bg-slate-950 border border-slate-800 rounded-3xl p-8 text-sm font-mono focus:border-blue-500 outline-none text-emerald-500/90" placeholder="Paste URL for cloning or WP detection, describe layout, or paste code to fix..."></textarea>

            <div class="mt-10 grid grid-cols-1 md:grid-cols-5 gap-4">
                <div class="flex flex-col">
                    <span class="text-[11px] text-slate-500 mb-2.5 uppercase font-bold">Environment</span>
                    <select id="targetEditor" class="bg-slate-900 border border-slate-800 p-4 rounded-2xl text-sm outline-none">
                        <option value="tailwind">Tailwind CSS</option>
                        <option value="elementor">WordPress</option>
                        <option value="react">React</option>
                    </select>
                </div>
                <button onclick="send('clone')" class="btn-magic bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold text-sm mt-auto">🚀 Clone</button>
                <button onclick="send('layout')" class="btn-magic bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold text-sm mt-auto">🎨 Layout</button>
                <button onclick="send('debug')" class="btn-magic bg-slate-800 hover:bg-slate-700 py-4 rounded-2xl font-bold text-sm mt-auto">🔍 Fix Bug</button>
                <button onclick="send('wp_detect')" class="btn-magic bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold text-sm mt-auto">🕵️ WP Detect</button>
            </div>
        </div>

        <div id="loading" class="hidden mt-12 text-center animate-pulse">
            <p class="text-blue-400 text-xs font-mono tracking-[0.3em] uppercase">Neural Engine Processing...</p>
        </div>

        <div id="resBox" class="hidden mt-12 pb-10">
            <div class="flex justify-between items-center mb-3 px-3">
                <span class="text-[11px] text-slate-600 uppercase font-bold tracking-widest font-mono">Console Output</span>
                <button onclick="copyCode()" class="text-[11px] text-blue-400 hover:underline">Copy All</button>
            </div>
            <div id="result" class="result-box bg-slate-950 border border-slate-900 p-10 rounded-[2.5rem] font-mono text-xs text-emerald-500/80 leading-relaxed overflow-x-auto"></div>
        </div>
    </div>

    <script>
        // Cursor Logic
        const follower = document.getElementById('magic-cursor');
        let mX = 0, mY = 0, fX = 0, fY = 0;
        document.addEventListener('mousemove', (e) => { mX = e.clientX; mY = e.clientY; });
        function move() {
            fX += (mX - fX) * 0.18; fY += (mY - fY) * 0.18;
            follower.style.transform = `translate3d(${fX}px, ${fY}px, 0) translate(-50%, -50%)`;
            requestAnimationFrame(move);
        }
        move();
        document.querySelectorAll('button, select, label').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering-effect'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering-effect'));
        });

        // Communication Logic
        async function send(mode) {
            const loading = document.getElementById('loading');
            const resBox = document.getElementById('resBox');
            const result = document.getElementById('result');
            const text = document.getElementById('userInput').value;
            
            if(!text) return alert("Please enter input!");

            loading.classList.remove('hidden');
            resBox.classList.add('hidden');

            const formData = new FormData();
            formData.append('text', text);
            formData.append('mode', mode);
            formData.append('editor', document.getElementById('targetEditor').value);

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const data = await response.json();
                
                if(mode === 'wp_detect' && data.status === "success") {
                    result.innerHTML = `<b>Theme:</b> ${data.theme}<br><br><b>Plugins:</b><br>${data.plugins.join(', ')}`;
                } else {
                    result.innerText = data.result;
                }
                resBox.classList.remove('hidden');
            } catch (e) {
                alert("Server Error");
            } finally {
                loading.classList.add('hidden');
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('result').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
