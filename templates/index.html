<!-- Pehle wala saara Header aur Main Buttons wese hi rahen ge -->

<div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
    
    <!-- Aapke Pehle wale 4 Buttons (Clone, Layout, Debug, WP Detect) -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <button onclick="handleSend('clone')" class="btn-magic bg-blue-600 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-900/20">🚀 Clone Site</button>
        <button onclick="handleSend('layout')" class="btn-magic bg-emerald-600 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-emerald-900/20">🎨 Layout Code</button>
        <button onclick="handleSend('debug')" class="btn-magic bg-slate-800 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest border border-slate-700">🔍 Fix Bug</button>
        <button onclick="handleSend('wp_detect')" class="btn-magic bg-indigo-600 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-indigo-900/20">🕵️ WP Detect</button>
    </div>

    <!-- SIRF YEH HISSA ADD KIYA HAI BUTTONS KE NECHE -->
    <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 25px; padding-top: 20px;">
        <div class="flex justify-center items-center gap-10">
            
            <!-- Elementor -->
            <div onclick="activateTech(this)" class="tech-label flex items-center gap-2 text-slate-500 cursor-pointer transition-all duration-200 hover:font-bold hover:text-white group">
                <i class="fas fa-layer-group text-pink-500 group-hover:scale-125 transition-transform"></i>
                <span class="text-[11px] uppercase tracking-widest">Elementor</span>
            </div>

            <!-- Tailwind -->
            <div onclick="activateTech(this)" class="tech-label flex items-center gap-2 text-slate-500 cursor-pointer transition-all duration-200 hover:font-bold hover:text-white group">
                <i class="fab fa-css3 text-cyan-400 group-hover:scale-125 transition-transform"></i>
                <span class="text-[11px] uppercase tracking-widest">Tailwind CSS</span>
            </div>

            <!-- React -->
            <div onclick="activateTech(this)" class="tech-label flex items-center gap-2 text-slate-500 cursor-pointer transition-all duration-200 hover:font-bold hover:text-white group">
                <i class="fab fa-react text-blue-500 group-hover:scale-125 transition-transform"></i>
                <span class="text-[11px] uppercase tracking-widest">React / Next.js</span>
            </div>

        </div>
    </div>

    <!-- Baki Textarea aur Result Box wese hi rahega -->
    <div class="mt-10">
        <textarea id="userInput" class="w-full h-64 bg-slate-950 border border-slate-800 rounded-3xl p-6 text-sm font-mono focus:border-blue-500 outline-none" placeholder="Paste URL or describe layout..."></textarea>
    </div>
</div>

<style>
    /* Sirf Click hone par Button banne ki CSS */
    .active-tech-btn {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 8px 16px;
        border-radius: 12px;
        color: white !important;
        font-weight: bold;
    }
</style>

<script>
    function activateTech(el) {
        // Pehle se active button ko normal label banao
        document.querySelectorAll('.tech-label').forEach(item => {
            item.classList.remove('active-tech-btn');
        });
        // Sirf click wale ko button banao
        el.classList.add('active-tech-btn');
    }
</script>
